<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[必填] 替换为封面标题 · Editorial Documentary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap"
    rel="stylesheet">
  <style>
    /* ============ 主题色:暗夜人文 ============ */
    :root {
      --void:    #111111;
      --paper:   #f1ece5;
      --signal:  #b53a2a;     /* 暗红 */
      --soft:    rgba(241,236,229,.55);
      --whisper: rgba(241,236,229,.18);

      --serif:   "Noto Serif SC", "Playfair Display", "STZhongsong", "SimSun", serif;
      --serif-en:"Playfair Display", Georgia, serif;
      --sans:    "Noto Sans SC", system-ui, sans-serif;
      --mono:    "IBM Plex Mono", ui-monospace, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh; background: #050505;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 16px; overflow-x: hidden;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    #preview-wrap { transform-origin: top center; position: relative; flex-shrink: 0; }

    #cover {
      width: 1080px; height: 1920px;
      position: relative; overflow: hidden;
      background: var(--void); color: var(--paper);
      flex-shrink: 0;
    }

    /* 暗红渐变地板 */
    .gradient-floor {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 60%;
      background: linear-gradient(to top, #3a0e08 0%, transparent 100%);
      opacity: .55; z-index: 1;
    }

    /* 上方微弱光斑 */
    .top-haze {
      position: absolute; top: -200px; left: -200px;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(241,236,229,.06) 0%, transparent 70%);
      z-index: 1; filter: blur(60px);
    }

    /* 右侧竖向小字装饰 */
    .vertical-text {
      position: absolute; top: 120px; right: 60px;
      width: 28px; z-index: 4;
      color: var(--whisper);
      font-family: var(--mono); font-size: 22px;
      letter-spacing: .8em;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      text-transform: uppercase;
    }

    /* 左侧纵向暗红记号线 */
    .accent-bar {
      position: absolute; top: 580px; left: 78px;
      width: 4px; height: 240px; background: var(--signal);
      z-index: 4;
    }

    /* 顶部品牌行 */
    .brand-row {
      position: absolute; top: 90px; left: 78px;
      z-index: 5; display: flex; align-items: center; gap: 18px;
      font-family: var(--mono); font-size: 24px;
      letter-spacing: .28em; color: var(--soft);
      text-transform: uppercase;
    }
    .brand-row::before {
      content: ''; width: 32px; height: 1px;
      background: var(--soft);
    }

    /* 主内容 */
    .main-content {
      position: absolute; top: 600px; left: 130px;
      right: 130px; z-index: 10;
    }
    .quote-mark {
      font-family: var(--serif-en); font-style: italic;
      font-size: 240px; color: var(--signal);
      line-height: 0; margin-bottom: 80px;
      display: block;
    }
    .main-title {
      font-family: var(--serif); font-weight: 700;
      font-size: 132px; line-height: 1.22;
      letter-spacing: .04em; margin-bottom: 56px;
      text-shadow: 0 8px 28px rgba(0,0,0,.85);
    }
    .focus-box {
      background: var(--signal); color: var(--paper);
      font-family: var(--mono); font-weight: 400;
      font-size: 26px; padding: 14px 28px;
      display: inline-block; letter-spacing: .26em;
      text-transform: uppercase;
    }
    .editorial-note {
      margin-top: 56px;
      font-family: var(--serif); font-style: italic;
      font-size: 32px; line-height: 1.6;
      color: var(--soft); max-width: 720px;
    }

    /* 底部信息线 */
    .footer-line {
      position: absolute; bottom: 90px; left: 78px; right: 78px;
      border-top: 1px solid var(--whisper); padding-top: 28px;
      color: var(--soft); font-family: var(--mono);
      font-size: 22px; letter-spacing: .22em;
      text-transform: uppercase;
      display: flex; justify-content: space-between;
      z-index: 6;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px) }
      to   { opacity: 1; transform: translateY(0) }
    }
    .anim    { opacity: 0; animation: fadeUp .9s cubic-bezier(.22,1,.36,1) forwards }
    .anim-d1 { animation-delay: .10s }
    .anim-d2 { animation-delay: .25s }
    .anim-d3 { animation-delay: .45s }
    .anim-d4 { animation-delay: .65s }
    .anim-d5 { animation-delay: .85s }

    #export-hint {
      position: fixed; bottom: 12px; right: 12px; z-index: 100;
      font-family: var(--mono); font-size: 12px; letter-spacing: .1em;
      color: #888; background: rgba(0,0,0,.6);
      padding: 8px 14px; border-radius: 4px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="preview-wrap">
    <div id="cover">
      <div class="gradient-floor"></div>
      <div class="top-haze"></div>
      <div class="vertical-text">DOCUMENTARY · SERIES 2026</div>
      <div class="accent-bar"></div>

      <div class="brand-row anim anim-d1">CHRONICLE · 卷叁</div>

      <div class="main-content">
        <span class="quote-mark anim anim-d2">"</span>
        <h1 class="main-title anim anim-d3">被遗忘的<br>工业巨兽</h1>
        <div class="focus-box anim anim-d4">特别专栏 · 连载</div>
        <p class="editorial-note anim anim-d5">
          一段被时间盖住的回响,一组在沉默中继续运转的机器,以及那些<br>
          仍在守望的身影。
        </p>
      </div>

      <div class="footer-line anim anim-d5">
        <span>VOL. 04</span>
        <span>EPISODE 02 · 08:45</span>
      </div>
    </div>
  </div>

  <div id="export-hint">1080 × 1920 · Editorial Documentary</div>

  <script>
    const wrap = document.getElementById('preview-wrap');
    function fitPreview() {
      const pad = 32;
      const scale = Math.min((window.innerWidth-pad)/1080, (window.innerHeight-pad)/1920, 1);
      wrap.style.transform = `scale(${scale})`;
      wrap.style.marginBottom = `${1920*(scale-1)}px`;
    }
    addEventListener('resize', fitPreview); fitPreview();
  </script>
</body>
</html>
