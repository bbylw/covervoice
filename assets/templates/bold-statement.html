<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[必填] 替换为封面标题 · Bold Statement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@500;700;900&family=IBM+Plex+Mono:wght@500&display=swap"
    rel="stylesheet">
  <style>
    /* ============ 主题色:重磅大字 ============ */
    :root {
      --void:    #050505;
      --line:    #131313;
      --signal:  #c8261f;
      --paper:   #ffffff;

      --serif: "Noto Serif SC", "Playfair Display", serif;
      --sans:  "Noto Sans SC", system-ui, sans-serif;
      --mono:  "IBM Plex Mono", ui-monospace, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh; background: #121212;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 16px; overflow-x: hidden;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    #preview-wrap { transform-origin: top center; position: relative; flex-shrink: 0; }

    #cover {
      width: 1080px; height: 1920px;
      position: relative; overflow: hidden;
      background: var(--void); color: var(--paper);
      flex-shrink: 0;
    }

    /* 45° 重复斜纹 */
    .bg-lines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        45deg,
        var(--line) 0 30px,
        var(--void) 30px 60px
      );
      opacity: .55; z-index: 1;
    }

    /* 顶部红色倾斜横幅 */
    .header-stripe {
      position: absolute; top: 240px; left: -8%;
      width: 116%;
      background: var(--signal);
      padding: 36px 0; transform: rotate(-5deg);
      z-index: 3; text-align: center;
      box-shadow: 0 0 60px rgba(200,38,31,.35);
    }
    .header-stripe span {
      font-family: var(--mono); font-weight: 500;
      font-size: 64px; letter-spacing: .12em;
      color: var(--paper); text-transform: uppercase;
    }
    .header-stripe small {
      display: block; font-family: var(--serif);
      font-weight: 700; font-size: 36px;
      letter-spacing: .08em; margin-top: 6px;
    }

    /* 主标题区 */
    .main-content {
      position: absolute; top: 720px; left: 0;
      width: 100%; padding: 0 78px; z-index: 4;
    }
    .subtitle-pill {
      background: var(--paper); color: var(--void);
      display: inline-block; padding: 14px 40px;
      font-family: var(--mono); font-weight: 500;
      font-size: 32px; letter-spacing: .12em;
      margin-bottom: 60px;
    }
    .title {
      font-family: var(--serif); font-weight: 900;
      font-size: 220px; line-height: 1.04;
      letter-spacing: -.02em;
      background: linear-gradient(180deg, #ffffff 0%, #ffffff 60%, #9c9c9c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 14px 14px rgba(0,0,0,.95));
    }

    /* 底部信息条 */
    .footer {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 160px;
      background: rgba(200,38,31,.92);
      z-index: 5; display: flex; align-items: center;
      padding: 0 78px;
      font-family: var(--mono); font-size: 30px;
      letter-spacing: .12em; color: var(--paper);
    }
    .footer .dot {
      width: 14px; height: 14px; background: var(--paper);
      border-radius: 50%; margin-right: 22px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px) }
      to   { opacity: 1; transform: translateY(0) }
    }
    .anim    { opacity: 0; animation: fadeUp .85s cubic-bezier(.22,1,.36,1) forwards }
    .anim-d1 { animation-delay: .10s }
    .anim-d2 { animation-delay: .30s }
    .anim-d3 { animation-delay: .50s }
    .anim-d4 { animation-delay: .70s }

    #export-hint {
      position: fixed; bottom: 12px; right: 12px; z-index: 100;
      font-family: var(--mono); font-size: 12px; letter-spacing: .1em;
      color: #888; background: rgba(0,0,0,.6);
      padding: 8px 14px; border-radius: 4px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="preview-wrap">
    <div id="cover">
      <div class="bg-lines"></div>

      <div class="header-stripe anim anim-d1">
        <span>FEATURE STORY</span>
        <small>本期重磅特辑</small>
      </div>

      <div class="main-content">
        <div class="subtitle-pill anim anim-d2">VOL. 02 · 卷首推荐</div>
        <h1 class="title anim anim-d3">城市动脉<br>全面升级</h1>
      </div>

      <div class="footer anim anim-d4">
        <span class="dot"></span>
        VOL. 02 · 智慧出行年度卷首专题
      </div>
    </div>
  </div>

  <div id="export-hint">1080 × 1920 · Bold Statement</div>

  <script>
    const wrap = document.getElementById('preview-wrap');
    function fitPreview() {
      const pad = 32;
      const scale = Math.min((window.innerWidth-pad)/1080, (window.innerHeight-pad)/1920, 1);
      wrap.style.transform = `scale(${scale})`;
      wrap.style.marginBottom = `${1920*(scale-1)}px`;
    }
    addEventListener('resize', fitPreview); fitPreview();
  </script>
</body>
</html>
