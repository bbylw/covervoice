<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[必填] 替换为封面标题 · Pulse Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Serif+SC:wght@600;700;900&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* ============ 主题色:三色信号塔(可改) ============ */
    :root {
      --signal:    #c8261f;   /* 信号红 */
      --depth:     #0f2a47;   /* 深海蓝 */
      --highlight: #f0c14b;   /* 警示金 */
      --paper:     #ffffff;
      --void:      #07111d;

      --mono:    "IBM Plex Mono", ui-monospace, monospace;
      --serif:   "Noto Serif SC", "Playfair Display", serif;
      --sans:    "Noto Sans SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh; background: #121212;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 16px; overflow-x: hidden;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    #preview-wrap { transform-origin: top center; position: relative; flex-shrink: 0; }

    /* ============ 1080 × 1920 画布 ============ */
    #cover {
      width: 1080px; height: 1920px;
      position: relative; overflow: hidden;
      background: radial-gradient(circle at 50% 38%, #114066 0%, var(--void) 75%);
      color: var(--paper); flex-shrink: 0;
    }

    /* 倾斜网格背景 */
    #cover::before {
      content: ''; position: absolute;
      width: 200%; height: 200%; top: -50%; left: -50%;
      background-image:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 150px 150px;
      transform: rotate(15deg); z-index: 1;
    }

    /* 右下深蓝光晕 */
    .glow {
      position: absolute; bottom: 8%; right: -120px;
      width: 720px; height: 720px;
      background: var(--depth); filter: blur(220px);
      border-radius: 50%; opacity: .55; z-index: 1;
    }

    /* ============ 顶部标识栏 ============ */
    .header-bar {
      position: absolute; top: 90px; left: 0; width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 78px; z-index: 10;
    }
    .logo-mark {
      background: var(--signal); color: var(--paper);
      padding: 14px 36px; font-family: var(--serif);
      font-weight: 900; font-size: 42px; letter-spacing: .04em;
      transform: skewX(-12deg);
    }
    .logo-mark > span { display: inline-block; transform: skewX(12deg); }
    .moment-tag {
      background: rgba(7,17,29,.65); border: 1px solid var(--signal);
      padding: 14px 22px; font-family: var(--mono);
      font-size: 24px; letter-spacing: .18em;
      display: flex; align-items: center; color: var(--paper);
    }
    .moment-tag::before {
      content: ''; width: 16px; height: 16px;
      background: var(--signal); border-radius: 50%;
      margin-right: 14px; animation: pulse 1.4s infinite;
    }

    /* ============ 中心内容区 ============ */
    .content-area {
      position: absolute; bottom: 240px; left: 78px;
      width: calc(100% - 156px); z-index: 10;
    }
    .category-tag {
      background: var(--highlight); color: #1a1505;
      display: inline-block; padding: 10px 26px;
      font-family: var(--mono); font-weight: 500;
      font-size: 28px; letter-spacing: .14em;
      text-transform: uppercase; margin-bottom: 30px;
    }
    .main-title {
      font-family: var(--serif);
      font-size: 168px; line-height: 1.05;
      font-weight: 900; letter-spacing: -.01em;
      text-shadow: 0 12px 36px rgba(0,0,0,.7);
      margin-bottom: 36px;
    }
    .subtitle {
      font-family: var(--serif); font-weight: 400;
      font-size: 42px; line-height: 1.45;
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding: 26px 30px;
      border-left: 8px solid var(--highlight);
      max-width: 820px;
    }

    /* ============ 底部带状信息条 ============ */
    .ticker-wrap {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 130px;
      background: var(--depth);
      display: flex; align-items: center;
      overflow: hidden; z-index: 20;
    }
    .ticker-title {
      background: var(--signal); color: var(--paper);
      height: 100%; display: flex; align-items: center;
      padding: 0 48px; white-space: nowrap;
      font-family: var(--serif); font-weight: 900;
      font-size: 38px; letter-spacing: .06em; z-index: 30;
    }
    .ticker-text {
      white-space: nowrap; padding-left: 40px;
      font-family: var(--mono); font-size: 30px;
      letter-spacing: .08em; color: var(--paper);
      animation: scroll 28s linear infinite;
    }

    @keyframes pulse  { 0%,100% { opacity: 1 } 50% { opacity: .25 } }
    @keyframes scroll { 0% { transform: translateX(100%) } 100% { transform: translateX(-100%) } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px) }
      to   { opacity: 1; transform: translateY(0) }
    }
    .anim    { opacity: 0; animation: fadeUp .8s cubic-bezier(.22,1,.36,1) forwards }
    .anim-d1 { animation-delay: .10s }
    .anim-d2 { animation-delay: .25s }
    .anim-d3 { animation-delay: .40s }
    .anim-d4 { animation-delay: .55s }
    .anim-d5 { animation-delay: .70s }

    #export-hint {
      position: fixed; bottom: 12px; right: 12px; z-index: 100;
      font-family: var(--mono); font-size: 12px; letter-spacing: .1em;
      color: #888; background: rgba(0,0,0,.6);
      padding: 8px 14px; border-radius: 4px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="preview-wrap">
    <div id="cover">
      <div class="glow"></div>

      <div class="header-bar">
        <div class="logo-mark anim anim-d1"><span>卷首专题</span></div>
        <div class="moment-tag anim anim-d1">VOL.01 · 20:45</div>
      </div>

      <div class="content-area">
        <div class="category-tag anim anim-d2">FOCUS · 深度专题</div>
        <h1 class="main-title anim anim-d3">时代脉搏<br>正在被改写</h1>
        <div class="subtitle anim anim-d4">
          关于结构、节奏与方向的一次<br>系统性观察与回应。
        </div>
      </div>

      <div class="ticker-wrap anim anim-d5">
        <div class="ticker-title">本期卷首</div>
        <div class="ticker-text">
          专题 · 现场 · 长读 · 对谈 · 影像 · 数据 · 评论 · 卷尾词 · 致每一位长期主义者 · 
        </div>
      </div>
    </div>
  </div>

  <div id="export-hint">1080 × 1920 · Pulse Briefing</div>

  <script>
    /* 预览自动缩放 */
    const wrap = document.getElementById('preview-wrap');
    function fitPreview() {
      const pad = 32;
      const scale = Math.min((window.innerWidth-pad)/1080, (window.innerHeight-pad)/1920, 1);
      wrap.style.transform = `scale(${scale})`;
      wrap.style.marginBottom = `${1920*(scale-1)}px`;
    }
    addEventListener('resize', fitPreview); fitPreview();
  </script>
</body>
</html>
