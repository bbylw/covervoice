<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[必填] 替换为封面标题 · Gilded Glass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Noto+Serif+SC:wght@600;700;900&family=Noto+Sans+SC:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    /* ============ 主题色:鎏金毛玻璃 ============ */
    :root {
      --void:    #0b0f19;
      --deep:    #1a233a;
      --gold-1:  #fcf6ba;
      --gold-2:  #bf953f;
      --gold-3:  #b38728;
      --paper:   #ffffff;
      --soft:    rgba(255,255,255,.72);

      --serif:   "Noto Serif SC", "Playfair Display", serif;
      --serif-en:"Playfair Display", Georgia, serif;
      --sans:    "Noto Sans SC", system-ui, sans-serif;
      --mono:    "IBM Plex Mono", ui-monospace, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh; background: #050505;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 16px; overflow-x: hidden;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    #preview-wrap { transform-origin: top center; position: relative; flex-shrink: 0; }

    #cover {
      width: 1080px; height: 1920px;
      position: relative; overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 110%, var(--deep) 0%, transparent 60%),
        var(--void);
      color: var(--paper); flex-shrink: 0;
    }

    /* 鎏金氛围光晕 */
    .ambient-glow {
      position: absolute; top: 28%; left: 50%;
      width: 1050px; height: 1050px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(191,149,63,.22) 0%, transparent 70%);
      border-radius: 50%; filter: blur(120px);
      z-index: 1;
    }

    /* 顶部装饰细线粒子 */
    .star-field {
      position: absolute; inset: 0; z-index: 2;
      background-image:
        radial-gradient(1px 1px at 20% 18%, rgba(252,246,186,.6) 50%, transparent),
        radial-gradient(1.5px 1.5px at 70% 12%, rgba(252,246,186,.4) 50%, transparent),
        radial-gradient(1px 1px at 88% 24%, rgba(252,246,186,.5) 50%, transparent),
        radial-gradient(1px 1px at 10% 80%, rgba(252,246,186,.4) 50%, transparent),
        radial-gradient(1.5px 1.5px at 80% 86%, rgba(252,246,186,.5) 50%, transparent);
      background-size: 100% 100%;
      opacity: .85;
    }

    /* 顶部品牌行 */
    .top-bar {
      position: absolute; top: 0; left: 0; width: 100%;
      padding: 90px 78px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 6;
    }
    .brand {
      color: var(--paper); font-family: var(--mono);
      font-weight: 400; font-size: 28px; letter-spacing: .32em;
      display: flex; align-items: center; gap: 20px;
    }
    .brand::before {
      content: ''; width: 10px; height: 38px;
      background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
    }
    .top-meta {
      font-family: var(--mono); font-size: 22px;
      letter-spacing: .22em; color: rgba(255,255,255,.45);
      text-transform: uppercase;
    }

    /* 毛玻璃内容卡 */
    .glass-card {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 84%; z-index: 8;
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 32px; padding: 100px 72px 110px;
      box-shadow:
        0 60px 120px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.10);
    }
    .tag {
      font-family: var(--mono); font-size: 24px;
      color: var(--gold-2); text-transform: uppercase;
      letter-spacing: .32em; margin-bottom: 56px;
      border-bottom: 1px solid rgba(191,149,63,.35);
      padding-bottom: 14px; display: inline-block;
    }
    .title {
      font-family: var(--serif); font-weight: 800;
      font-size: 132px; line-height: 1.18; letter-spacing: -.005em;
      margin-bottom: 56px;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2) 55%, var(--gold-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .desc {
      color: var(--soft); font-family: var(--serif);
      font-weight: 400; font-size: 38px; line-height: 1.6;
    }
    .divider-row {
      display: flex; align-items: center; gap: 22px;
      margin-top: 72px;
      font-family: var(--mono); font-size: 22px;
      letter-spacing: .26em; color: rgba(255,255,255,.55);
      text-transform: uppercase;
    }
    .divider-row .line {
      flex: 1; height: 1px; background: rgba(255,255,255,.18);
    }

    /* 底部装饰 */
    .bottom-mark {
      position: absolute; bottom: 90px; left: 0; width: 100%;
      text-align: center; z-index: 6;
      font-family: var(--mono); font-size: 22px;
      color: rgba(255,255,255,.38); letter-spacing: .42em;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px) }
      to   { opacity: 1; transform: translateY(0) }
    }
    @keyframes glassRise {
      from { opacity: 0; transform: translate(-50%, -46%) }
      to   { opacity: 1; transform: translate(-50%, -50%) }
    }
    .anim    { opacity: 0; animation: fadeUp .9s cubic-bezier(.22,1,.36,1) forwards }
    .anim-d1 { animation-delay: .10s }
    .anim-d2 { animation-delay: .25s }
    .anim-d3 { animation-delay: .45s }
    .anim-d4 { animation-delay: .65s }
    .anim-d5 { animation-delay: .85s }
    .glass-card.anim { animation: glassRise 1.05s cubic-bezier(.22,1,.36,1) forwards }

    #export-hint {
      position: fixed; bottom: 12px; right: 12px; z-index: 100;
      font-family: var(--mono); font-size: 12px; letter-spacing: .1em;
      color: #888; background: rgba(0,0,0,.6);
      padding: 8px 14px; border-radius: 4px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="preview-wrap">
    <div id="cover">
      <div class="ambient-glow"></div>
      <div class="star-field"></div>

      <div class="top-bar">
        <div class="brand anim anim-d1">GLOBAL INSIGHT</div>
        <div class="top-meta anim anim-d1">VOL.05 · 2026</div>
      </div>

      <div class="glass-card anim anim-d2">
        <div class="tag">卷首特辑 · 2026</div>
        <h1 class="title">全球资本<br>暗流涌动</h1>
        <p class="desc">
          一次关于规模、节奏与边界的重新审视——<br>
          以及它们正在塑造的下一个十年。
        </p>
        <div class="divider-row">
          <span>CHAPTER 01</span>
          <span class="line"></span>
          <span>10 MIN READ</span>
        </div>
      </div>

      <div class="bottom-mark">— G L O B A L   I N S I G H T —</div>
    </div>
  </div>

  <div id="export-hint">1080 × 1920 · Gilded Glass</div>

  <script>
    const wrap = document.getElementById('preview-wrap');
    function fitPreview() {
      const pad = 32;
      const scale = Math.min((window.innerWidth-pad)/1080, (window.innerHeight-pad)/1920, 1);
      wrap.style.transform = `scale(${scale})`;
      wrap.style.marginBottom = `${1920*(scale-1)}px`;
    }
    addEventListener('resize', fitPreview); fitPreview();
  </script>
</body>
</html>
